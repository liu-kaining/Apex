name: Apex Insider Daily

on:
  schedule:
    - cron: "0 22 * * 1-5"
      timezone: America/New_York
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apex-insider-daily
  cancel-in-progress: true

jobs:
  insider-etl:
    name: Insider + resonance + upload
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Restore 13F cache
        id: cache-13f
        uses: actions/cache/restore@v4
        with:
          path: |
            data-pipelines/output/13f
            data-pipelines/config/cusip_ticker_cache.json
          key: apex-13f-data
          restore-keys: |
            apex-13f-data
      - name: Verify 13F cache
        run: |
          count=$(find data-pipelines/output/13f/by_cik -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          echo "13F portfolio files on disk: $count"
          if [ "$count" -lt 10 ]; then
            echo "::warning::Few or no 13F files — insider feed will still upload, but no STRONG_RESONANCE until you run Apex 13F Quarterly (or Full Pipeline) successfully."
          fi
      - name: Fetch insider trades
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python data-pipelines/scripts/fetch_fmp_insider.py
      - name: Generate signals
        run: python data-pipelines/scripts/generate_signals.py
      - name: Generate timelines + grid refresh
        run: |
          python data-pipelines/scripts/generate_ticker_timelines.py
          python data-pipelines/scripts/generate_sp500_grid.py --all-tickers
      - name: Write manifest
        run: python data-pipelines/scripts/write_manifest.py
      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python data-pipelines/scripts/upload_to_r2.py --skip-missing
      - name: Apply R2 CORS (browser fetch from Pages)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python data-pipelines/scripts/apply_r2_cors.py --warn-only
